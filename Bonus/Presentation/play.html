        var iframe = document.getElementById('slideFrame');
        var total = SLIDES.length;
        var current = 0;
        var WIDTH = 1280;
        var HEIGHT = 720;

        function fitScale() {
          if (!iframe) return;
          var scale = Math.min(window.innerWidth / WIDTH, window.innerHeight / HEIGHT);
          iframe.style.transform = 'scale(' + scale + ')';
          iframe.style.transformOrigin = 'center center';
        }

        function show(index) {
          if (index < 0 || index >= total) return;
          current = index;
          iframe.srcdoc = SLIDES[current];
          fitScale();
        }

        function enterFullscreen() {
          var el = document.documentElement;
          (el.requestFullscreen || el.webkitRequestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
        }

        function exitFullscreen() {
          var doc = document;
          (doc.exitFullscreen || doc.webkitExitFullscreen || doc.webkitCancelFullScreen || doc.mozCancelFullScreen || doc.msExitFullscreen).call(doc);
        }

        function showFullscreenHint() {
          trigger.classList.remove('ready');
        }

        function hideFullscreenHint() {
          trigger.classList.add('ready');
        }

        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
            exitFullscreen();
            return;
          }
          var trigger = document.getElementById('fullscreenTrigger');
          if (!trigger.classList.contains('ready')) return;
          if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { if (current > 0) show(current - 1); e.preventDefault(); }
          if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (current < total - 1) show(current + 1); e.preventDefault(); }
        });

        function onFullscreenChange() {
          var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
          if (isFs) hideFullscreenHint();
          else showFullscreenHint();
        }
        document.addEventListener('fullscreenchange', onFullscreenChange);
        document.addEventListener('webkitfullscreenchange', onFullscreenChange);
        document.addEventListener('mozfullscreenchange', onFullscreenChange);
        document.addEventListener('MSFullscreenChange', onFullscreenChange);

        var trigger = document.getElementById('fullscreenTrigger');
        var overlay = document.getElementById('fullscreenOverlay');
        overlay.addEventListener('click', function(e) {
          if (trigger.classList.contains('ready')) {
            var mid = window.innerWidth / 2;
            if (e.clientX < mid) { if (current > 0) show(current - 1); }
            else { if (current < total - 1) show(current + 1); }
          } else if (e.target === trigger || trigger.contains(e.target)) {
            enterFullscreen();

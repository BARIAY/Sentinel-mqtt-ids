       </div>\n            <!-- Main Content -->\n            <div class=\"flex-1 flex gap-[30px] relative z-10 pt-[15px] pb-[20px]\">\n                <!-- Left Column: Text Content -->\n                <div class=\"w-[380px] flex flex-col justify-start gap-[20px]\">\n                    <!-- Justification Block -->\n                    <div>\n                        <h3 class=\"text-[20px] font-bold text-black mb-[8px] leading-tight\">Justification (rapport)</h3>\n                        <p class=\"text-[16px] text-black leading-[1.4]\">\n                            La modélisation temporelle est la clé pour dépasser les modèles statiques. Les modèles classiques (SVM, Random Forest, XGBoost) traitent chaque fenêtre de trafic de manière isolée.\n                        </p>\n                    </div>\n                    <!-- LSTM Advantage Block -->\n                    <div>\n                        <h3 class=\"text-[20px] font-bold text-black mb-[8px] leading-tight\">Avantage du LSTM</h3>\n                        <p class=\"text-[16px] text-black leading-[1.4]\">\n                            Utilise des séquences (et non des fenêtres isolées) pour capturer des dépendances temporelles complexes caractéristiques des attaques DoS.\n                        </p>\n                    </div>\n                    <!-- Key Points -->\n                    <div class=\"flex flex-col gap-[10px]\">\n                        <div class=\"flex items-start gap-[8px]\">\n                            <div class=\"w-[6px] h-[6px] bg-[#0048FF] rounded-full mt-[6px] flex-shrink-0\"></div>\n                            <span class=\"text-[15px] text-black leading-[1.3]\">Mémoire à long terme des patterns d'attaque</span>\n                        </div>\n                        <div class=\"flex items-start gap-[8px]\">\n                            <div class=\"w-[6px] h-[6px] bg-[#0048FF] rounded-full mt-[6px] flex-shrink-0\"></div>\n                            <span class=\"text-[15px] text-black leading-[1.3]\">Détection de séquences anormales sur plusieurs fenêtres</span>\n                        </div>\n                        <div class=\"flex items-start gap-[8px]\">\n                            <div class=\"w-[6px] h-[6px] bg-[#0048FF] rounded-full mt-[6px] flex-shrink-0\"></div>\n                            <span class=\"text-[15px] text-black leading-[1.3]\">Capture des rafales temporelles complexes</span>\n                        </div>\n                    </div>\n                </div>\n                <!-- Right Column: Images -->\n                <div class=\"flex-1 flex flex-col gap-[20px]\">\n                    <!-- AI Pipeline Image -->\n                    <div class=\"w-full h-[260px] overflow-hidden relative border-2 border-black\" style=\"transform: translate(0px, -4.55208px);\">\n                        <div class=\"absolute w-full h-full object-contain slide-image-editor\" style=\"width: 766px; height: 256px; overflow: hidden;\"><img src=\"assets/68434017db92.jpg\" alt=\"AI Pipeline\" style=\"position: absolute; width: 479.86px; height: 250.914px; max-width: none; max-height: none; min-width: 0px; min-height: 0px; pointer-events: none; top: 2.54317px; left: 143.07px; transform: rotate(0deg);\"></div>\n                    </div>\n                    <div class=\"text-center text-[14px] text-black font-semibold -mt-[15px]\">Pipeline de traitement des données</div>\n                    <!-- LSTM Architecture Image -->\n                    <div class=\"w-full h-[260px] overflow-hidden relative border-2 border-black\">\n                        <img src=\"assets/d4cc1b4e5fcf.png\" alt=\"LSTM Architecture\" class=\"absolute w-full h-full object-contain\">\n                    </div>\n                    <div class=\"text-center text-[14px] text-black font-semibold -mt-[15px]\">Architecture du réseau LSTM</div>\n                </div>\n            </div>\n        </div>\n    </div>\n\n              \n              \n              \n              \n              \n              \n</body></html>","<!DOCTYPE html><html lang=\"fr\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=1280, initial-scale=1.0\">\n    <title>Résultats comparatifs</title>\n    <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n    <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n    <link href=\"assets/17bbd9226759.css\" rel=\"stylesheet\">\n    <script src=\"assets/0e205e71e3e4.js\"><\/script>\n    <style>\n        .font-funnel {\n            font-family: 'Funnel Display', sans-serif;\n        }\n    </style>\n</head>\n<body class=\"min-h-screen flex items-center justify-center bg-gray-100 font-funnel m-0 p-0\">\n    <div class=\"slide-container relative w-[1280px] h-[720px] bg-white overflow-hidden flex flex-col\">\n        <!-- Content -->\n        <div class=\"flex flex-col flex-1 px-[50px] pt-[20px] relative z-20\">\n            <!-- Header -->\n            <div class=\"w-full relative z-20\">\n                <div class=\"flex justify-between items-center text-[15px] mx-auto text-black\">\n                    <div>2026</div>\n                    <div>- A.I. SUMMIT -</div>\n                    <div id=\"header\">DUBAI</div>\n                </div>\n                <!-- Decorative Element: Divider Line (Below Header) -->\n                <div class=\"mx-auto h-[1px] outline-1 outline-black mt-[10px]\"></div>\n                <!-- Title -->\n                <div class=\"text-[48px] font-extrabold text-black mt-[20px] mb-[10px]\">Résultats comparatifs</div>\n            </div>\n            <!-- Main Content -->\n            <div class=\"flex-1 flex items-center justify-center relative z-10 px-[30px] py-[20px]\">\n                <div class=\"w-full max-w-[1100px]\">\n                    <!-- Comparative Table -->\n                    <div class=\"absolute -right-[20px] top-1/2 -translate-y-1/2 w-[40px] h-[40px] bg-black rounded-full\"></div><table class=\"w-full border-collapse\">\n                        <thead>\n                            <tr class=\"bg-black text-white\">\n                                <th class=\"text-left py-[16px] px-[24px] text-[22px] font-bold border-2 border-black\">Modèle</th>\n                                <th class=\"text-center py-[16px] px-[24px] text-[22px] font-bold border-2 border-black\">Accuracy</th>\n                                <th class=\"text-center py-[16px] px-[24px] text-[22px] font-bold border-2 border-black\">F1-Score</th>\n                                <th class=\"text-center py-[16px] px-[24px] text-[22px] font-bold border-2 border-black\">AUC-ROC</th>\n                            </tr>\n                        </thead>\n                        <tbody>\n                            <!-- SVM Row -->\n                            <tr class=\"bg-white hover:bg-gray-50 transition-colors\">\n                                <td class=\"py-[14px] px-[24px] text-[20px] font-semibold text-black border-2 border-black\">SVM</td>\n                                <td class=\"text-center py-[14px] px-[24px] text-[20px] text-black border-2 border-black\">82,0%</td>\n                                <td class=\"text-center py-[14px] px-[24px] text-[20px] text-black border-2 border-black\">0,80</td>\n                                <td class=\"text-center py-[14px] px-[24px] text-[20px] text-black border-2 border-black\">0,91</td>\n                            </tr>\n                            <!-- Random Forest Row -->\n                            <tr class=\"bg-white hover:bg-gray-50 transition-colors\">\n                                <td class=\"py-[14px] px-[24px] text-[20px] font-semibold text-black border-2 border-black\">Random Forest</td>\n                                <td class=\"text-center py-[14px] px-[24px] text-[20px] text-black border-2 border-black\">86,0%</td>\n                                <td class=\"text-center py-[14px] px-[24px] text-[20px] text-black border-2 border-black\">0,85</td>\n                                <td class=\"text-center py-[14px] px-[24px] text-[20px] text-black border-2 border-black\">0,94</td>\n                            </tr>\n                            <!-- XGBoost Row -->\n                            <tr class=\"bg-white hover:bg-gray-50 transition-colors\">\n                                <td class=\"py-[14px] px-[24px] text-[20px] font-semibold text-black border-2 border-black\">XGBoost</td>\n                                <td class=\"text-center py-[14px] px-[24px] text-[20px] text-black border-2 border-black\">89,0%</td>\n                                <td class=\"text-center py-[14px] px-[24px] text-[20px] text-black border-2 border-black\">0,87</td>\n                                <td class=\"text-center py-[14px] px-[24px] text-[20px] text-black border-2 border-black\">0,98</td>\n                            </tr>\n                            <!-- LSTM Row (Highlighted) -->\n                            <tr class=\"bg-[#0048FF] text-white relative\">\n                                <td class=\"py-[14px] px-[24px] text-[20px] font-extrabold border-2 border-black\">LSTM (Deep Learning)</td>\n                                <td class=\"text-center py-[14px] px-[24px] text-[20px] font-bold border-2 border-black\">98,2%</td>\n                                <td class=\"text-center py-[14px] px-[24px] text-[20px] font-bold border-2 border-black\">0,95</td>\n                                <td class=\"text-center py-[14px] px-[24px] text-[20px] font-bold border-2 border-black\">0,99</td>\n                                <!-- Decorative Element: Circle Accent -->\n                                \n                            </tr>\n                        </tbody>\n                    </table>\n                    <!-- Key Insight -->\n                    <div class=\"mt-[30px] flex items-start gap-[15px]\">\n                        <div class=\"w-[6px] h-[6px] bg-[#0048FF] rounded-full mt-[8px] flex-shrink-0\"></div>\n                        <p class=\"text-[18px] text-black leading-relaxed\">\n                            <span class=\"font-bold\">Le LSTM obtient les meilleurs résultats</span> avec un F1-score de 0,95. Cette nette supériorité prouve que la prise en compte de la dimension temporelle est la clé technique pour détecter les attaques DoS avec une précision que les modèles statiques (XGBoost, RF) ne peuvent atteindre.\n                        </p>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n\n</body></html>","<!DOCTYPE html><html lang=\"fr\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=1280, initial-scale=1.0\">\n    <title>LSTM : matrice de confusion &amp; ROC-AUC</title>\n    <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n    <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n    <link href=\"assets/17bbd9226759.css\" rel=\"stylesheet\">\n    <script src=\"assets/0e205e71e3e4.js\"><\/script>\n    <script src=\"assets/c86a68379fb4.js\"><\/script>\n    <style>\n        .font-funnel {\n            font-family: 'Funnel Display', sans-serif;\n        }\n    </style>\n</head>\n<body class=\"min-h-screen flex items-center justify-center bg-gray-100 font-funnel m-0 p-0\">\n    <div class=\"slide-container relative w-[1280px] h-[720px] bg-white overflow-hidden flex flex-col\">\n        \n        <!-- Header -->\n        <div class=\"w-full px-[50px] pt-[20px] relative z-40 flex-shrink-0\">\n            <div class=\"flex justify-between items-center text-[15px] mx-auto text-black\">\n                <div>2026</div>\n                <div>- A.I. SUMMIT -</div>\n                <div id=\"header\">Master IA &amp; Objets Connectés</div>\n            </div>\n            <!-- Decorative Element: Divider Line -->\n            <div class=\"mx-auto h-[1px] outline-1 outline-black mt-[10px]\"></div>\n  detectsOn: \"canvas\",\n                    events: {\n                        resize: true\n                    }\n                },\n                retina_detect: true\n            });\n\n            // GSAP Animations\n            const tl = gsap.timeline();\n\n            // Header entrance\n            tl.fromTo(\".header-anim\", \n                { y: -20, opacity: 0 }, \n                { y: 0, opacity: 1, duration: 0.8, ease: \"power2.out\" }\n            );\n\n            // Title zoom-in and settle\n            tl.fromTo(\".title-anim\", \n                { scale: 0.5, opacity: 0 }, \n                { scale: 1, opacity: 1, duration: 1.2, ease: \"back.out(1.5)\" },\n                \"-=0.4\"\n            );\n\n            // Accent line expand\n            tl.fromTo(\".line-anim\", \n                { width: 0, opacity: 0 }, \n                { width: 300, opacity: 1, duration: 0.8, ease: \"power2.out\" },\n                \"-=0.6\"\n            );\n\n            // Subtitle float up\n            tl.fromTo(\".subtitle-anim\", \n                { y: 30, opacity: 0 }, \n                { y: 0, opacity: 1, duration: 0.8, ease: \"power2.out\" },\n                \"-=0.4\"\n            );\n\n            // Ambient drift for the blur sphere\n            gsap.to(\".sphere-anim\", {\n                x: 100,\n                y: -50,\n                duration: 8,\n                repeat: -1,\n                yoyo: true,\n                ease: \"sine.inOut\"\n            });\n        });\n    <\/script>\n\n</body></html>"];
        var iframe = document.getElementById('slideFrame');
        var total = SLIDES.length;
        var current = 0;
        var WIDTH = 1280;
        var HEIGHT = 720;

        function fitScale() {
          if (!iframe) return;
          var scale = Math.min(window.innerWidth / WIDTH, window.innerHeight / HEIGHT);
          iframe.style.transform = 'scale(' + scale + ')';
          iframe.style.transformOrigin = 'center center';
        }

        function show(index) {
          if (index < 0 || index >= total) return;
          current = index;
          iframe.srcdoc = SLIDES[current];
          fitScale();
        }

        function enterFullscreen() {
          var el = document.documentElement;
          (el.requestFullscreen || el.webkitRequestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
        }

        function exitFullscreen() {
          var doc = document;
          (doc.exitFullscreen || doc.webkitExitFullscreen || doc.webkitCancelFullScreen || doc.mozCancelFullScreen || doc.msExitFullscreen).call(doc);
        }

        function showFullscreenHint() {
          trigger.classList.remove('ready');
        }

        function hideFullscreenHint() {
          trigger.classList.add('ready');
        }

        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
            exitFullscreen();
            return;
          }
          var trigger = document.getElementById('fullscreenTrigger');
          if (!trigger.classList.contains('ready')) return;
          if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { if (current > 0) show(current - 1); e.preventDefault(); }
          if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (current < total - 1) show(current + 1); e.preventDefault(); }
        });

        function onFullscreenChange() {
          var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
          if (isFs) hideFullscreenHint();
          else showFullscreenHint();
        }
        document.addEventListener('fullscreenchange', onFullscreenChange);
        document.addEventListener('webkitfullscreenchange', onFullscreenChange);
        document.addEventListener('mozfullscreenchange', onFullscreenChange);
        document.addEventListener('MSFullscreenChange', onFullscreenChange);

        var trigger = document.getElementById('fullscreenTrigger');
        var overlay = document.getElementById('fullscreenOverlay');
        overlay.addEventListener('click', function(e) {
          if (trigger.classList.contains('ready')) {
            var mid = window.innerWidth / 2;
            if (e.clientX < mid) { if (current > 0) show(current - 1); }
            else { if (current < total - 1) show(current + 1); }
          } else if (e.target === trigger || trigger.contains(e.target)) {
            enterFullscreen();
          }
        });

        window.addEventListener('resize', fitScale);

        show(0);
      })();
    </script>
